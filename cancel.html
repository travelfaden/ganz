<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="images/logo.png">
    <title>Zahlung abgebrochen – Travel Faden</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles.css">
    <style>
        .cancel-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-light);
        }
        .cancel-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            text-align: center;
            max-width: 600px;
        }
        .cancel-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        .cancel-card h1 {
            color: var(--text-color);
            margin-bottom: 1rem;
        }
        .cancel-card p {
            color: var(--text-light);
            margin-bottom: 1rem;
            line-height: 1.8;
        }
        .cancel-actions {
            margin-top: 1.5rem;
        }
        .cancel-button {
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }
        .cancel-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }
        .secondary-button {
            padding: 1rem 2.5rem;
            background: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }
        .secondary-button:hover {
            background: var(--bg-light);
        }
    </style>
</head>
<body>
    <div class="cancel-container">
        <div class="cancel-card">
            <div class="cancel-icon" aria-hidden="true">❌</div>
            <h1>Zahlung abgebrochen</h1>
            <p>Ihre Zahlung wurde nicht abgeschlossen. Es wurden keine Beträge belastet.</p>
            <p>Sie können jederzeit zurückgehen und Ihre Bestellung erneut starten.</p>
            <div class="cancel-actions">
                <a href="/#vouchers" class="cancel-button">Erneut versuchen</a>
                <a href="/" class="secondary-button">Zur Startseite</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
