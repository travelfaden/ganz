<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <title>Zahlung erfolgreich – Travel Faden</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-light);
        }
        .success-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        .success-card h1 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        .success-card p {
            color: var(--text-light);
            margin-bottom: 1rem;
            line-height: 1.8;
        }
        .success-order-box {
            margin: 1.25rem 0 1.5rem;
            padding: 1.25rem 1.5rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            text-align: left;
        }
        .success-order-box p {
            margin: 0 0 0.75rem;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #64748b;
        }
        .success-order-box p:last-child {
            margin-bottom: 0;
        }
        .success-order-value {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 700;
            color: #0f172a;
            font-family: Consolas, Monaco, 'Courier New', monospace;
            word-break: break-all;
        }
        .success-order-value--accent {
            color: #2563eb;
        }
        .success-button {
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        .success-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }
        .success-back {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-light);
            text-decoration: none;
        }
        .success-back:hover {
            color: var(--primary-color);
        }
        .success-card--pending .success-icon,
        .success-card--error .success-icon {
            font-size: 3rem;
        }
        .success-card--error h1 {
            color: #b91c1c;
        }
        .success-card--pending h1 {
            color: var(--text-color);
        }
    </style>
</head>
<body class="success-page">
    <div class="success-container">
        <div class="success-card" id="successCard">
            <div class="success-icon" id="successIcon" aria-hidden="true">⏳</div>
            <h1 id="successTitle">Zahlung wird überprüft…</h1>
            <div id="successBody">
                <p>Bitte warten Sie einen Moment.</p>
            </div>
            <div id="successActions" hidden>
                <a href="/" class="success-button">Zur Startseite</a>
                <br>
                <a href="/reisevorschlaege" class="success-back">← Weitere Reisevorschläge ansehen</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id');
            const card = document.getElementById('successCard');
            const icon = document.getElementById('successIcon');
            const title = document.getElementById('successTitle');
            const body = document.getElementById('successBody');
            const actions = document.getElementById('successActions');

            const backendUrl = typeof BACKEND_URL !== 'undefined'
                ? BACKEND_URL
                : window.location.origin;

            function showActions() {
                actions.hidden = false;
            }

            function renderPaid(data) {
                card.classList.remove('success-card--pending', 'success-card--error');
                icon.textContent = '✅';
                title.textContent = 'Zahlung erfolgreich!';
                document.title = 'Zahlung erfolgreich – Travel Faden';

                let html = `
                    <p>Vielen Dank für Ihre Bestellung bei <strong>Travel Faden</strong>.</p>
                `;

                if (data.orderNumber) {
                    html += `
                        <div class="success-order-box">
                            <div>
                                <p>Bestellnummer</p>
                                <p class="success-order-value">${escapeHtml(data.orderNumber)}</p>
                            </div>
                    `;
                    if (data.reisevorschlagId) {
                        html += `
                            <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid #e2e8f0;">
                                <p>Reisevorschlag des Tages ID</p>
                                <p class="success-order-value success-order-value--accent">${escapeHtml(data.reisevorschlagId)}</p>
                            </div>
                        `;
                    }
                    html += '</div>';
                    html += '<p>Sie erhalten zusätzlich eine E-Mail mit Ihrer Bestellbestätigung.</p>';
                } else if (data.processing) {
                    html += `
                        <p>Ihre Zahlung wurde bestätigt. Ihre Bestellnummer wird gerade erstellt.</p>
                        <p>Sie erhalten in Kürze eine E-Mail mit Ihrer Bestellbestätigung und Bestellnummer.</p>
                    `;
                } else {
                    html += `
                        <p>Sie erhalten in Kürze eine E-Mail mit Ihrer Bestellbestätigung und Bestellnummer.</p>
                    `;
                }

                html += '<p>Bitte prüfen Sie auch Ihren Spam-Ordner, falls die Nachricht nicht ankommt.</p>';
                body.innerHTML = html;
                showActions();
            }

            function renderError(message, isPending) {
                card.classList.toggle('success-card--error', !isPending);
                card.classList.toggle('success-card--pending', Boolean(isPending));
                icon.textContent = isPending ? '⏳' : '❌';
                title.textContent = isPending ? 'Zahlung wird bearbeitet' : 'Zahlung nicht abgeschlossen';
                body.innerHTML = `<p>${escapeHtml(message)}</p>`;
                showActions();
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            async function verifySession(attempt) {
                if (!sessionId) {
                    renderError('Es wurde keine Zahlungsinformation gefunden. Bitte kehren Sie zur Startseite zurück.', false);
                    return;
                }

                try {
                    const response = await fetch(
                        `${backendUrl}/api/verify-session?sessionId=${encodeURIComponent(sessionId)}`
                    );
                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Fehler bei der Überprüfung der Zahlung');
                    }

                    if (data.paid) {
                        renderPaid(data);
                        if (data.processing && attempt < 8) {
                            setTimeout(function () {
                                verifySession(attempt + 1);
                            }, 2000);
                        }
                        return;
                    }

                    renderError(
                        'Ihre Zahlung wurde nicht abgeschlossen. Es wurden keine Beträge belastet. Sie können es erneut versuchen.',
                        false
                    );
                } catch (error) {
                    renderError(error.message || 'Fehler bei der Überprüfung der Zahlung', false);
                }
            }

            verifySession(0);
        })();
    </script>
</body>
</html>
